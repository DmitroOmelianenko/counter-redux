name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Або master, залежно від назви вашої головної гілки

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-node-version: 20 # Вкажіть вашу версію Node.js (наприклад, 18 або 20)
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Якщо у вас Vite — залиште dist. Якщо Create React App — змініть на build
          branch: gh-pages # Гілка, куди збирається готовий сайт
